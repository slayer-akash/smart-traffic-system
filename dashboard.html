<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Traffic System — Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  body { background: #0f1419; color: #e6e6e6; padding: 20px; }
  h1 { color: #4ade80; margin-bottom: 6px; }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .card {
    background: #1a2028;
    border: 1px solid #2d3640;
    border-radius: 8px;
    padding: 16px;
  }
  .card h2 {
    font-size: 16px;
    margin-bottom: 12px;
    color: #4ade80;
    border-bottom: 1px solid #2d3640;
    padding-bottom: 8px;
  }

  /* Signals row */
  .signals { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .signal {
    background: #0f1419;
    border: 1px solid #2d3640;
    border-radius: 6px;
    padding: 8px;
    text-align: center;
  }
  .signal .name { font-size: 12px; color: #888; margin-bottom: 6px; }
  .lights { display: flex; flex-direction: column; gap: 3px; align-items: center; }
  .light {
    width: 22px; height: 22px; border-radius: 50%;
    background: #2d3640; transition: 0.2s;
  }
  .light.red.on    { background: #ef4444; box-shadow: 0 0 12px #ef4444; }
  .light.yellow.on { background: #facc15; box-shadow: 0 0 12px #facc15; }
  .light.green.on  { background: #4ade80; box-shadow: 0 0 12px #4ade80; }

  /* Cameras (4) */
  .cameras { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cam {
    background: #0f1419;
    border: 1px solid #2d3640;
    border-radius: 6px;
    padding: 10px;
  }
  .cam .name { font-weight: bold; color: #4ade80; margin-bottom: 4px; }
  .cam .stat { font-size: 13px; color: #ccc; }
  .cam .alert { color: #ef4444; font-weight: bold; }
  .cam .actions { margin-top: 6px; }
  .cam button {
    font-size: 11px; padding: 4px 8px; margin-right: 4px;
    background: #2d3640; color: #e6e6e6;
    border: 1px solid #444; border-radius: 4px;
    cursor: pointer;
  }
  .cam button:hover { background: #3a4450; }
  .cam button.danger { border-color: #ef4444; color: #ef4444; }

  /* Controls */
  .controls { display: flex; flex-wrap: wrap; gap: 8px; }
  .controls button {
    padding: 8px 14px;
    background: #2d3640;
    color: #e6e6e6;
    border: 1px solid #444;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
  }
  .controls button:hover { background: #3a4450; }
  .controls button.allred { border-color: #ef4444; color: #ef4444; }
  .controls button.auto   { border-color: #4ade80; color: #4ade80; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 6px; text-align: left; border-bottom: 1px solid #2d3640; }
  th { color: #888; font-weight: normal; }

  /* Search */
  .search { display: flex; gap: 8px; margin-bottom: 12px; }
  .search input {
    flex: 1; padding: 8px;
    background: #0f1419; color: #e6e6e6;
    border: 1px solid #2d3640; border-radius: 5px;
  }
  .search button {
    padding: 8px 14px; background: #4ade80; color: #0f1419;
    border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
  }
  .results { max-height: 200px; overflow-y: auto; }

  .badge {
    display: inline-block; padding: 2px 6px; border-radius: 3px;
    font-size: 11px; font-weight: bold;
  }
  .badge.red { background: #ef4444; color: white; }
  .badge.yellow { background: #facc15; color: black; }
  .badge.green { background: #4ade80; color: black; }
</style>
</head>
<body>

<h1>🚦 Smart Traffic System</h1>
<div class="subtitle">8 signals • 4 cameras • ESP32 controlled</div>

<!-- Signal indicators -->
<div class="card" style="margin-bottom:20px;">
  <h2>Signal States</h2>
  <div class="signals" id="signals"></div>
</div>

<div class="grid">
  <!-- Cameras -->
  <div class="card">
    <h2>Cameras</h2>
    <div class="cameras" id="cameras"></div>
  </div>

  <!-- Controls -->
  <div class="card">
    <h2>Manual Controls</h2>
    <div class="controls" id="controls"></div>
    <hr style="margin:12px 0; border-color:#2d3640;">
    <div class="controls">
      <button class="auto"  onclick="setAuto()">▶ Auto Mode</button>
      <button class="allred" onclick="allRed()">⛔ ALL RED</button>
    </div>
  </div>

  <!-- Plate Search -->
  <div class="card">
    <h2>Vehicle Search (Plate Trail)</h2>
    <div class="search">
      <input id="plateInput" placeholder="e.g. TN09AB1234" />
      <button onclick="searchPlate()">🔍 Search</button>
    </div>
    <div class="results" id="searchResults">
      <p style="color:#888;font-size:13px;">Enter a plate number to trace its journey.</p>
    </div>
  </div>

  <!-- Recent Events -->
  <div class="card">
    <h2>Recent Events</h2>
    <table id="eventsTable">
      <thead><tr><th>Time</th><th>Type</th><th>Camera</th><th>Detail</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Recent Plates -->
<div class="card">
  <h2>Recent Plates</h2>
  <table id="platesTable">
    <thead><tr><th>Time</th><th>Plate</th><th>Camera</th><th>Signal</th><th>State</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script>
const NUM_SIGNALS = 8;
const NUM_CAMERAS = 4;

// Build signal grid once
const sigGrid = document.getElementById("signals");
for (let i = 0; i < NUM_SIGNALS; i++) {
  sigGrid.innerHTML += `
    <div class="signal">
      <div class="name">S${i+1}</div>
      <div class="lights">
        <div class="light red"    id="s${i}-red"></div>
        <div class="light yellow" id="s${i}-yellow"></div>
        <div class="light green"  id="s${i}-green"></div>
      </div>
    </div>`;
}

// Build camera cards once
const camGrid = document.getElementById("cameras");
for (let i = 0; i < NUM_CAMERAS; i++) {
  camGrid.innerHTML += `
    <div class="cam" id="cam-${i}">
      <div class="name" id="cam-${i}-name">Cam ${i}</div>
      <div class="stat" id="cam-${i}-stat">Vehicles: 0</div>
      <div class="stat" id="cam-${i}-flags"></div>
      <div class="actions">
        <button class="danger" onclick="reportAccident(${i})">⚠ Accident</button>
        <button onclick="clearAccident(${i})">✓ Clear</button>
      </div>
    </div>`;
}

// Build manual override buttons (1 per cam)
const ctrl = document.getElementById("controls");
for (let i = 0; i < NUM_CAMERAS; i++) {
  ctrl.innerHTML += `<button onclick="override(${i})">Force GREEN: Cam ${i}</button>`;
}

// ── API helpers ──
async function fetchJSON(url) {
  try { return await (await fetch(url)).json(); }
  catch (e) { return null; }
}

async function override(cam)        { await fetchJSON(`/api/override/${cam}`); }
async function setAuto()             { await fetchJSON("/api/auto"); }
async function allRed()              { await fetchJSON("/api/allred"); }
async function reportAccident(cam)   { await fetchJSON(`/api/accident/${cam}`); }
async function clearAccident(cam)    { await fetchJSON(`/api/accident_clear/${cam}`); }

async function searchPlate() {
  const plate = document.getElementById("plateInput").value.trim().toUpperCase();
  if (!plate) return;
  const data = await fetchJSON(`/api/search/${plate}`);
  const box = document.getElementById("searchResults");
  if (!data || data.length === 0) {
    box.innerHTML = `<p style="color:#ef4444;">No record of plate "${plate}"</p>`;
    return;
  }
  let html = `<table><thead><tr><th>Time</th><th>Camera</th><th>Signal</th><th>State</th></tr></thead><tbody>`;
  data.forEach(row => {
    const t = (row.timestamp || row[4] || "").substring(0, 19);
    const cam = row.road || row[1] || "";
    const sig = row.signal_id || row[2] || "";
    const st  = row.state || row[3] || "";
    html += `<tr><td>${t}</td><td>${cam}</td><td>${sig}</td><td><span class="badge ${st}">${st}</span></td></tr>`;
  });
  html += "</tbody></table>";
  box.innerHTML = html;
}

// ── Refresh loop ──
async function refresh() {
  const status = await fetchJSON("/api/status");
  if (!status) return;

  // Signals
  const states = status.signal_state || [];
  for (let i = 0; i < NUM_SIGNALS; i++) {
    const st = states[i] || "red";
    ["red","yellow","green"].forEach(c => {
      const el = document.getElementById(`s${i}-${c}`);
      if (el) el.classList.toggle("on", c === st);
    });
  }

  // Cameras
  const counts = status.vehicle_counts || [];
  const camNames = status.cam_names || [];
  const accs = status.accident_flags || [];
  const congs = status.congestion_alerts || [];
  const ambCam = status.ambulance_cam;
  for (let i = 0; i < NUM_CAMERAS; i++) {
    document.getElementById(`cam-${i}-name`).textContent = `Cam ${i} — ${camNames[i] || ""}`;
    document.getElementById(`cam-${i}-stat`).textContent = `Vehicles: ${counts[i] || 0}`;
    let flags = [];
    if (ambCam === i)  flags.push('<span class="alert">🚨 AMBULANCE</span>');
    if (accs[i])       flags.push('<span class="alert">⚠ ACCIDENT</span>');
    if (congs[i])      flags.push('<span class="alert">🚗 CONGESTED</span>');
    document.getElementById(`cam-${i}-flags`).innerHTML = flags.join(" ");
  }

  // Events
  const events = await fetchJSON("/api/events") || [];
  const evtBody = document.querySelector("#eventsTable tbody");
  evtBody.innerHTML = "";
  events.forEach(e => {
    const t = (e.timestamp || e[4] || "").substring(0, 19);
    evtBody.innerHTML += `<tr><td>${t}</td><td>${e.event_type || e[1]}</td><td>${e.road || e[2]}</td><td>${e.detail || e[3] || ""}</td></tr>`;
  });

  // Plates
  const plates = await fetchJSON("/api/plates") || [];
  const plBody = document.querySelector("#platesTable tbody");
  plBody.innerHTML = "";
  plates.forEach(p => {
    const t = (p.timestamp || p[4] || "").substring(0, 19);
    const st = p.state || p[3] || "";
    plBody.innerHTML += `<tr><td>${t}</td><td><b>${p.plate || p[0]}</b></td><td>${p.road || p[1]}</td><td>${p.signal_id || p[2]}</td><td><span class="badge ${st}">${st}</span></td></tr>`;
  });
}

refresh();
setInterval(refresh, 1500);
</script>

</body>
</html>
